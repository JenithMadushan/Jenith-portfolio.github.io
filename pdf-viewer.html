<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PDF Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      background: #181818;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      z-index: 10;
      border-bottom: 1px solid #333;
    }

    .back-link,
    .download-link {
      color: white;
      background: #252525;
      border: 1px solid #444;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
    }

    .back-link:hover,
    .download-link:hover {
      background: #333;
    }

    #pdfTitle {
      font-size: 16px;
      text-align: center;
    }

    #message {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
      background: #202020;
      border-radius: 8px;
      line-height: 1.6;
      text-align: center;
    }

    #pdfPages {
      padding: 24px 12px;
    }

    #pdfPages canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto 24px;
      background: white;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    }

    code {
      color: #ffd166;
    }

    @media (max-width: 600px) {
      header {
        justify-content: center;
      }

      #pdfTitle {
        width: 100%;
        order: -1;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="index.html" class="back-link">Back</a>

    <strong id="pdfTitle">Portfolio PDF</strong>

    <a id="download" href="#" class="download-link" download>Download</a>
  </header>

  <main>
    <div id="message">Loading PDF...</div>
    <div id="pdfPages"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const title = params.get("title") || "Portfolio PDF";

    const pagesContainer = document.getElementById("pdfPages");
    const message = document.getElementById("message");
    const download = document.getElementById("download");

    document.getElementById("pdfTitle").textContent = title;
    download.href = file || "#";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    async function renderAllPages(pdfDoc) {
      message.style.display = "none";
      pagesContainer.innerHTML = "";

      for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
        const page = await pdfDoc.getPage(pageNumber);

        const viewport = page.getViewport({ scale: 1.4 });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        pagesContainer.appendChild(canvas);

        await page.render({
          canvasContext: context,
          viewport: viewport
        }).promise;
      }
    }

    async function loadPdf() {
      if (!file) {
        message.innerHTML = "No PDF selected.";
        download.style.display = "none";
        return;
      }

      try {
        const pdfDoc = await pdfjsLib.getDocument(file).promise;
        await renderAllPages(pdfDoc);
      } catch (error) {
        message.innerHTML =
          `<strong>${title} is not uploaded yet.</strong><br>` +
          `Upload it here: <code>${file}</code>`;
      }
    }

    loadPdf();
  </script>
</body>
</html>
